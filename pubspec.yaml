name: ginilog_customer_app
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.6.1

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  carousel_slider: ^5.0.0
  cherry_toast: ^1.11.0
  connectivity_plus: ^6.1.2
  country_code_picker: ^3.2.0
  cupertino_icons: ^1.0.8
  custom_rating_bar: ^3.0.0
  datetime_picker_formfield_new: ^2.1.0
  dotted_border: ^2.1.0
  dropdown_button2: ^2.3.9
  email_validator: ^3.0.0
  expandable: ^5.0.1
  flutter:
    sdk: flutter
  flutter_cache_manager: ^3.4.1
  flutter_image_compress: ^2.4.0
  flutter_local_notifications: ^18.0.1
  flutter_paystack_max: ^1.0.5
  flutter_polyline_points: ^2.1.0
  flutter_riverpod: ^2.6.1
  flutter_spinkit: ^5.2.1
  flutter_svg: ^2.0.17
  flutterwave_standard_smart: ^1.0.4
  font_awesome_flutter: ^10.8.0
  gap: ^3.0.1
  geocoding: ^3.0.0
  geolocator: ^13.0.2
  get_it: ^8.0.3
  google_maps_flutter: ^2.10.0
  google_places_api_flutter: ^1.0.6
  google_places_autocomplete_text_field: ^1.1.0
  google_sign_in: ^6.2.2
  http: ^1.3.0
  image_picker: ^1.1.2
  intl: ^0.20.2
  logger: ^2.5.0
  money_formatter: ^0.0.6
  overlay_support: ^2.1.0
  paystack_for_flutter: ^1.0.2
  permission_handler: ^11.3.1
  pinput: ^5.0.1
  readmore: ^3.0.0
  shared_preferences: ^2.4.0
  shimmer: ^3.0.0
  sign_in_with_apple: ^6.1.4
  smooth_page_indicator: ^1.2.0+3
  stop_watch_timer: ^3.2.1
  upgrader: ^11.3.1
  url_launcher: ^6.3.1
dependency_overrides:
  intl: ^0.19.0
  get_it: ^8.0.3
dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec
# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true
  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/images/
    - assets/svgs/
    - assets/nigeria_state.json
  #   - images/a_dot_ham.jpeg
  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware
  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/assets-and-images/#from-packages
  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  fonts:
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat-Black.ttf
        - asset: assets/fonts/Montserrat-BlackItalic.ttf
        - asset: assets/fonts/Montserrat-Bold.ttf
        - asset: assets/fonts/Montserrat-BoldItalic.ttf
        - asset: assets/fonts/Montserrat-ExtraBold.ttf
        - asset: assets/fonts/Montserrat-ExtraBoldItalic.ttf
        - asset: assets/fonts/Montserrat-ExtraLight.ttf
        - asset: assets/fonts/Montserrat-ExtraLightItalic.ttf
        - asset: assets/fonts/Montserrat-Italic.ttf
        - asset: assets/fonts/Montserrat-Light.ttf
        - asset: assets/fonts/Montserrat-LightItalic.ttf
        - asset: assets/fonts/Montserrat-Medium.ttf
        - asset: assets/fonts/Montserrat-MediumItalic.ttf
        - asset: assets/fonts/Montserrat-Regular.ttf
        - asset: assets/fonts/Montserrat-SemiBold.ttf
        - asset: assets/fonts/Montserrat-SemiBoldItalic.ttf
        - asset: assets/fonts/Montserrat-Thin.ttf
        - asset: assets/fonts/Montserrat-ThinItalic.ttf
          style: normal
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Black.otf
        - asset: assets/fonts/Inter-BlackItalic.otf
        - asset: assets/fonts/Inter-Bold.otf
        - asset: assets/fonts/Inter-BoldItalic.otf
        - asset: assets/fonts/Inter-ExtraBold.otf
        - asset: assets/fonts/Inter-ExtraBoldItalic.otf
        - asset: assets/fonts/Inter-ExtraLight-BETA.otf
        - asset: assets/fonts/Inter-ExtraLightItalic-BETA.otf
        - asset: assets/fonts/Inter-Italic.otf
        - asset: assets/fonts/Inter-Light-BETA.otf
        - asset: assets/fonts/Inter-LightItalic-BETA.otf
        - asset: assets/fonts/Inter-Medium.otf
        - asset: assets/fonts/Inter-MediumItalic.otf
        - asset: assets/fonts/Inter-Regular.otf
        - asset: assets/fonts/Inter-SemiBold.otf
        - asset: assets/fonts/Inter-SemiBoldItalic.otf
        - asset: assets/fonts/Inter-Thin-BETA.otf
        - asset: assets/fonts/Inter-ThinItalic-BETA.otf
          style: normal
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
